apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocketid-data
  namespace: {{ .Release.Namespace }}
  annotations:
    recurring-job-group.longhorn.io/backups-enabled: enabled
    recurring-job-group.longhorn.io/fstrim-enabled: enabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
