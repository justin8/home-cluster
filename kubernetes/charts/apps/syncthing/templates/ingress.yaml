apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syncthing
  namespace: {{ .Release.Namespace }}
  annotations:
    # traefik.ingress.kubernetes.io/router.middlewares: traefik-private-tinyauth@kubernetescrd
spec:
  ingressClassName: traefik-private
  rules:
    - host: syncthing.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: syncthing
                port:
                  number: 8384
  tls:
    - hosts:
        - syncthing.{{ .Values.global.domain }}
      secretName: default-tls
