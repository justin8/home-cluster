apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: {{ .Values.PGID | default 2000 }}
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: webserver
          image: "{{ .Values.images.app.repository }}:{{ .Values.images.app.tag }}"
          imagePullPolicy: {{ .Values.images.app.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-config
          env:
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: PAPERLESS_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
        - name: redis
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          ports:
            - containerPort: 6379
        - name: gotenberg
          image: "{{ .Values.images.gotenberg.repository }}:{{ .Values.images.gotenberg.tag }}"
          imagePullPolicy: {{ .Values.images.gotenberg.pullPolicy }}
          ports:
            - containerPort: 3000
        - name: tika
          image: "{{ .Values.images.tika.repository }}:{{ .Values.images.tika.tag }}"
          imagePullPolicy: {{ .Values.images.tika.pullPolicy }}
          ports:
            - containerPort: 9998
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
