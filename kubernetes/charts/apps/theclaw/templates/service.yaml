apiVersion: v1
kind: Service
metadata:
  name: theclaw
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - protocol: TCP
      port: 18789
      targetPort: 18789
---
apiVersion: v1
kind: Endpoints
metadata:
  name: theclaw
  namespace: {{ .Release.Namespace }}
subsets:
  - addresses:
      - ip: {{ .Values.network.theclawServer }}
    ports:
      - port: 18789
