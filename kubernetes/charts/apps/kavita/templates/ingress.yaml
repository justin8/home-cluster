apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kavita
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik-public
  rules:
    - host: kavita.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kavita
                port:
                  number: 5000
  tls:
    - hosts:
        - kavita.{{ .Values.domain }}
      secretName: default-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kavita-private
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik-private
  rules:
    - host: kavita.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kavita
                port:
                  number: 5000
  tls:
    - hosts:
        - kavita.{{ .Values.domain }}
      secretName: default-tls
