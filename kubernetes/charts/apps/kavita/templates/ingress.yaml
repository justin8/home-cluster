{{- range list "traefik-public" "traefik-private" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kavita{{ if eq . "traefik-public" }}-public{{ end }}
  namespace: {{ $.Release.Namespace }}
  {{- if eq . "traefik-public" }}
  annotations:
    external-dns.alpha.kubernetes.io/target: home.{{ $.Values.domain }}
  {{- end }}
spec:
  ingressClassName: {{ . }}
  rules:
    - host: kavita.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kavita
                port:
                  number: 5000
  tls:
    - hosts:
        - kavita.{{ $.Values.domain }}
      secretName: default-tls
---
{{- end }}
