apiVersion: apps/v1
kind: Deployment
metadata:
  name: kavita
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kavita
  template:
    metadata:
      labels:
        app: kavita
    spec:
      containers:
        - name: kavita
          image: "{{ .Values.images.app.repository }}:{{ .Values.images.app.tag }}"
          imagePullPolicy: {{ .Values.images.app.pullPolicy }}
          ports:
            - containerPort: 5000
          env:
            - name: TZ
              value: {{ .Values.TZ }}
            - name: PUID
              value: {{ .Values.PUID | quote }}
            - name: PGID
              value: {{ .Values.PGID | quote }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /mnt/pool/media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: kavita-config
        - name: media
          nfs:
            server: {{ .Values.network.storageServer }}
            path: /mnt/pool/media
