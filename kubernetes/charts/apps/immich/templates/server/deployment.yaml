apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
  template:
    metadata:
      labels:
        app: immich
    spec:
      securityContext:
        fsGroup: {{ .Values.PGID }}
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: postgresql-isready
          image: "{{ .Values.images.database.repository }}:{{ .Values.images.database.tag }}"
          imagePullPolicy: {{ .Values.images.database.pullPolicy }}
          envFrom:
            - configMapRef:
                name: immich-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: password
            - name: DB_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: host
            - name: DB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: dbname
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: port
          command:
            - /bin/sh
            - -cu
            - 'until pg_isready "--user=${DB_USERNAME}" "--dbname=${DB_DATABASE_NAME}" "--host=${DB_HOSTNAME}" "--port=${DB_PORT}" ; do sleep 2 ; done'
      containers:
        - name: immich-server
          image: "{{ .Values.images.server.repository }}:{{ .Values.images.server.tag }}"
          imagePullPolicy: {{ .Values.images.server.pullPolicy }}
          ports:
            - containerPort: 2283
          envFrom:
            - configMapRef:
                name: immich-config
            - secretRef:
                name: immich-secrets
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: password
            - name: DB_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: host
            - name: DB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: dbname
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: port
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: {{ .Values.PUID }}
            runAsGroup: {{ .Values.PGID }}
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              port: 2283
              path: /
            initialDelaySeconds: 600
            periodSeconds: 60
          readinessProbe:
            httpGet:
              port: 2283
              path: /
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          nfs:
            server: {{ .Values.storageDNSName }}
            path: {{ .Values.appStoragePath }}/immich
