apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr-pomerium
  namespace: {{ .Release.Namespace }}
  annotations:
    ingress.pomerium.io/allow_any_authenticated_user: "true"
    dns.internal/enabled: "true"
    ingress.pomerium.io/policy: |
      - deny:
          and:
            - source_ip: {{ .Values.network.routerIp }}
spec:
  ingressClassName: pomerium
  rules:
  - host: sonarr.{{ .Values.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sonarr
            port:
              number: 8989
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr-pomerium-api
  namespace: {{ .Release.Namespace }}
  annotations:
    ingress.pomerium.io/allow_public_unauthenticated_access: "true"
    dns.internal/enabled: "true"
    ingress.pomerium.io/policy: |
      - deny:
          and:
            - source_ip: {{ .Values.network.routerIp }}
spec:
  ingressClassName: pomerium
  rules:
  - host: sonarr.{{ .Values.domain }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: sonarr
            port:
              number: 8989
