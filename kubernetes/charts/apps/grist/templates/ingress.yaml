apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grist
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: traefik-public-tinyauth@kubernetescrd
spec:
  ingressClassName: traefik-public
  rules:
    - host: grist.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grist
                port:
                  number: 8484
  tls:
    - hosts:
        - grist.{{ .Values.domain }}
      secretName: default-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grist-private
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik-private
  rules:
    - host: grist.{{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grist
                port:
                  number: 8484
  tls:
    - hosts:
        - grist.{{ .Values.domain }}
      secretName: default-tls
