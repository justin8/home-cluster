{{- range list "traefik-public" "traefik-private" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grist{{ if eq . "traefik-public" }}-public{{ end }}
  namespace: {{ $.Release.Namespace }}
  {{- if eq . "traefik-public" }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: traefik-public-tinyauth@kubernetescrd
  {{- end }}
spec:
  ingressClassName: {{ . }}
  rules:
    - host: grist.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grist
                port:
                  number: 8484
  tls:
    - hosts:
        - grist.{{ $.Values.domain }}
      secretName: default-tls
---
{{- end }}
