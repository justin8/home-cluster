apiVersion: apps/v1
kind: Deployment
metadata:
  name: apicache
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: apicache
  template:
    metadata:
      labels:
        app: apicache
    spec:
      containers:
        - name: apicache
          image: "{{ .Values.images.apicache.repository }}:{{ .Values.images.apicache.tag }}"
          imagePullPolicy: {{ .Values.images.apicache.pullPolicy }}
          ports:
            - containerPort: 8080
