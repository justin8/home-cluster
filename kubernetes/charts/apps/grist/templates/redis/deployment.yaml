apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - 'valkey-server --requirepass "$REDIS_PASSWORD" --dir /data --save 60 1000'
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grist-secrets
                  key: REDIS_PASSWORD
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", 'valkey-cli -a "$REDIS_PASSWORD" ping']
            initialDelaySeconds: 30
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", 'valkey-cli -a "$REDIS_PASSWORD" ping']
            initialDelaySeconds: 30
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: grist-redis-data
