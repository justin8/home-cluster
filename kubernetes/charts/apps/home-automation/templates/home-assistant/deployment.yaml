apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: home-assistant
          image: "{{ .Values.images.homeAssistant.repository }}:{{ .Values.images.homeAssistant.tag }}"
          imagePullPolicy: {{ .Values.images.homeAssistant.pullPolicy }}
          securityContext:
            privileged: true
          ports:
            - containerPort: 8123
              name: http
          envFrom:
            - configMapRef:
                name: home-automation-config
          livenessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
