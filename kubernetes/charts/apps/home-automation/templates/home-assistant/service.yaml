apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: {{ .Release.Namespace }}
  labels:
    app: home-assistant
spec:
  type: LoadBalancer
  selector:
    app: home-assistant
  ports:
    - port: 21063
      targetPort: 21063
      name: homekit
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-http
  namespace: {{ .Release.Namespace }}
  labels:
    app: home-assistant
spec:
  selector:
    app: home-assistant
  ports:
    - port: 8123
      targetPort: 8123
