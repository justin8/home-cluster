apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
  namespace: {{ .Release.Namespace }}
  labels:
    app: cloudflare-ddns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-ddns
  template:
    metadata:
      labels:
        app: cloudflare-ddns
    spec:
      containers:
        - name: cloudflare-ddns
          image: "{{ .Values.images.ddns.repository }}:{{ .Values.images.ddns.tag }}"
          imagePullPolicy: {{ .Values.images.ddns.pullPolicy }}
          env:
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
            - name: DOMAINS
              value: home.{{ .Values.domain }}
            - name: PROXIED
              value: "false"
