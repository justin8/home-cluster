# Custom DNS record: storage.domain -> NFS IP
apiVersion: v1
kind: Service
metadata:
  name: storage-dns-record
  namespace: {{ .Release.Namespace }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: storage.{{ .Values.domain }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.storageDNSName }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: 80
