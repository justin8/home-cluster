# DNS record: authenticate.domain -> Pomerium ingress IP
apiVersion: v1
kind: Service
metadata:
  name: authenticate-dns-record
  namespace: {{ .Release.Namespace }}
  annotations:
    dns.internal/hostname: authenticate.{{ .Values.domain }}
    dns.internal/target: {{ .Values.network.pomeriumIngress }}
    dns.external/enabled: "true"
    dns.external/hostname: authenticate.{{ .Values.domain }}
    dns.external/target: home.{{ .Values.domain }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: 80
