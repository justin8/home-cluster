{{- range list "traefik-public" "traefik-private" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pocketid{{ if eq . "traefik-private" }}-private{{ end }}
  namespace: {{ $.Release.Namespace }}
spec:
  ingressClassName: {{ . }}
  rules:
    - host: pocketid.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pocketid
                port:
                  number: 1411
  tls:
    - hosts:
        - pocketid.{{ $.Values.domain }}
      secretName: default-tls
---
{{- end }}
