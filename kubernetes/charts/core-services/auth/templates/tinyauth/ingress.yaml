apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tinyauth
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik-public
  rules:
    - host: tinyauth.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tinyauth
                port:
                  number: 3000
  tls:
    - hosts:
        - tinyauth.{{ .Values.global.domain }}
      secretName: default-tls
