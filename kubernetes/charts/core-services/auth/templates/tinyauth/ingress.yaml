{{- range list "traefik-public" "traefik-private" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tinyauth{{ if eq . "traefik-public" }}-public{{ end }}
  namespace: {{ $.Release.Namespace }}
spec:
  ingressClassName: {{ . }}
  rules:
    - host: tinyauth.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tinyauth
                port:
                  number: 3000
  tls:
    - hosts:
        - tinyauth.{{ $.Values.domain }}
      secretName: default-tls
---
{{- end }}
