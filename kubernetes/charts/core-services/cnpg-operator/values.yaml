cloudnative-pg:
  replicaCount: 1
  resources:
    limits:
      cpu: "1000m"
      memory: 768Mi
    requests:
      cpu: 200m
      memory: 256Mi
  config:
    INHERITED_LABELS: "app,kube-image-keeper.enix.io/image-caching-policy"
    monitoring:
      enabled: false
    logging:
      level: info
