---
# Expose the Longhorn UI on the private ingress only
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ui
  namespace: {{ .Release.Namespace }}
  # annotations:
    # Require authentication via tinyauth middleware
    # traefik.ingress.kubernetes.io/router.middlewares: traefik-private-tinyauth@kubernetescrd
spec:
  ingressClassName: traefik-private
  rules:
    - host: longhorn.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
  tls:
    - hosts:
        - longhorn.{{ .Values.global.domain }}
      secretName: default-tls
