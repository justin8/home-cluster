apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mail-proxy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/justin8/home-cluster.git
    path: kubernetes/charts/core-services/mail-proxy
    targetRevision: argocd2
    helm:
      valueFiles:
        - ../../../global-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mail-proxy
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
