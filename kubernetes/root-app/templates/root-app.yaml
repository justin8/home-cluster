apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/justin8/home-cluster.git # Must be hardcoded for initial bootstrap
    path: kubernetes/root-app/
    targetRevision: argocd2 # Must be hardcoded for initial bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false # Don't accidentally delete everything if this deployment is removed somehow
      selfHeal: true
