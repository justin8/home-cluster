apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-public
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://github.com/justin8/home-cluster.git
    path: kubernetes/charts/ingress-controller
    targetRevision: argocd2
    helm:
      valueFiles:
        - ../../global-values.yaml
      valuesObject:
        traefik:
          ingressClass:
            name: traefik-public
          service:
            annotations:
              metallb.io/address-pool: public-ingress
          providers:
            kubernetesIngress:
              ingressClass: traefik-public
            kubernetesCRD:
              namespaces:
                - traefik-public
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik-public
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
---
