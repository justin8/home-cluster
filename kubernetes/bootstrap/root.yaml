apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    path: kubernetes/apps
    repoURL: https://github.com/justin8/home-cluster.git # We can't use variables in the initial bootstrap script, but we can everywhere else
    targetRevision: argocd
    helm:
      valueFiles:
        - ../values/global.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
