name: Render manifests

on:
  push:
    branches:
      - main
    paths:
      - "kubernetes/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Render charts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin deploy 2>/dev/null || true
          git checkout deploy 2>/dev/null || git checkout --orphan deploy

          rm -rf kubernetes
          git restore --source=${{ github.sha }} kubernetes

          for chart in kubernetes/charts/*/*; do
            [ -f "$chart/Chart.yaml" ] || continue
            helm dependency update "$chart"
            helm template "$(basename "$chart")" "$chart" \
              --values kubernetes/global-values.yaml \
              --include-crds \
              > "$chart/manifest.yaml"
            # Remove chart source so ArgoCD treats the dir as plain manifests
            find "$chart" -mindepth 1 ! -name "manifest.yaml" -delete
          done

          find kubernetes/root-app/templates -name "*.yaml" \
            -exec sed -i 's/targetRevision: ${{ github.ref_name }}/targetRevision: deploy/' {} +

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: render manifests from ${{ github.sha }}"
          fi

      - name: Push to deploy branch
        run: git push origin deploy
